<p-toolbar [style]="{ height: '100px' }">
    <div class="p-toolbar-group-start">
        <img src="assets/icons/icon-72x72.png" alt="logo" />
    </div>
    <div class="p-toolbar-group-center">
        {{ title }}
    </div>
    <div class="flex gap-6">
        <!-- Login Button -->
        <div *ngIf="!loggedInUsernameSignal()" (click)="openLogin()" class="login-container gap-2">
            <i class="pi pi-user" style="font-size: 2rem; margin-left: 20px; cursor: pointer;"></i>
            <span style="font-size: 1.2rem; cursor: pointer;">Se connecter</span>
        </div>
        <div *ngIf="loggedInUsernameSignal()" class="login-container gap-2">
            <span style="font-size: 1.2rem;">Bienvenue, {{ loggedInUsernameSignal() }}</span>
            <i (click)="logout()" class="pi pi-sign-out"
                style="font-size: 1.2rem; cursor: pointer;"
                pTooltip="Logout" 
                tooltipPosition="bottom"
                ></i>
        </div>
        <div class="p-toolbar-group-end" (click)="openCart()">
            <i class="pi pi-shopping-cart" style="font-size: 2rem"></i>
            <span *ngIf="cartItemCount() > 0" class="cart-count">{{ cartItemCount() }}</span> <!-- Show count if greater than 0 -->
        </div>
    </div>
    
</p-toolbar>
<p-splitter 
    [panelSizes]="[20, 80]" 
    [style]="{ height: 'calc(100vh - 100px)' }">
    <ng-template pTemplate>
        <div class="w-full">
            <app-panel-menu />
        </div>
        
    </ng-template>
    <ng-template pTemplate>
        <div class="w-full app-content">
            <router-outlet></router-outlet>
        </div>
    </ng-template>
    
</p-splitter>
